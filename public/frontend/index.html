<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Управление задачами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .btn-danger {
            background: #e53e3e;
        }
        .btn-danger:hover {
            background: #c53030;
        }
        .btn-success {
            background: #48bb78;
        }
        .btn-warning {
            background: #ed8936;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        .tasks-table {
            width: 100%;
            border-collapse: collapse;
        }
        .tasks-table th, .tasks-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .tasks-table th {
            background: #f7f7f7;
            color: #555;
        }
        .priority-low {
            color: #48bb78;
            font-weight: bold;
        }
        .priority-medium {
            color: #ed8936;
            font-weight: bold;
        }
        .priority-high {
            color: #e53e3e;
            font-weight: bold;
        }
        .completed {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .hidden {
            display: none;
        }
        .user-info {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .token {
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .pagination button {
            padding: 5px 10px;
            font-size: 12px;
        }
        .filters-bar {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7f7f7;
            border-radius: 10px;
        }
        .filters-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 120px;
        }
        .filter-group label {
            font-size: 12px;
            margin-bottom: 3px;
        }
        .comments-section {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .comment {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .comment-author {
            font-weight: bold;
            color: #667eea;
        }
        .comment-date {
            font-size: 11px;
            color: #999;
        }
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 0 5px;
            padding: 0;
        }
        .likes-count {
            font-size: 13px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="authPanel" class="hidden">
            <div class="user-info">
                <div>
                    <strong>👤 <span id="userName"></span></strong>
                    <div class="token">🔑 Токен: <span id="userToken"></span></div>
                </div>
                <button onclick="logout()" class="btn-danger">Выйти</button>
            </div>
        </div>

        <div id="unauthPanel">
            <div class="two-columns">
                <div class="card">
                    <h2>📝 Регистрация</h2>
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" placeholder="Введите имя">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="Email">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)">
                    </div>
                    <button onclick="register()">Зарегистрироваться</button>
                </div>
                <div class="card">
                    <h2>🔐 Вход</h2>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Email">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Пароль">
                    </div>
                    <button onclick="login()">Войти</button>
                </div>
            </div>
        </div>

        <div id="tasksPanel" class="hidden">
            <div class="two-columns">
                <div class="card">
                    <h2>➕ Создать задачу</h2>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="taskTitle" placeholder="Название задачи">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="taskDesc" rows="3" placeholder="Описание"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Срок выполнения</label>
                        <input type="date" id="taskDueDate">
                    </div>
                    <div class="form-group">
                        <label>Приоритет</label>
                        <select id="taskPriority">
                            <option value="low">🟢 Низкий</option>
                            <option value="medium" selected>🟡 Средний</option>
                            <option value="high">🔴 Высокий</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Напоминание (дата и время)</label>
                        <input type="datetime-local" id="taskReminder">
                    </div>
                    <button onclick="createTask()">Создать задачу</button>
                </div>

                <div class="card">
                    <h2>📋 Мои задачи</h2>
                    
                    <div class="filters-bar">
                        <div class="filters-row">
                            <div class="filter-group">
                                <label>Статус</label>
                                <select id="filterCompleted">
                                    <option value="">Все</option>
                                    <option value="0">🔄 Не выполнены</option>
                                    <option value="1">✅ Выполнены</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Приоритет</label>
                                <select id="filterPriority">
                                    <option value="">Все</option>
                                    <option value="low">🟢 Низкий</option>
                                    <option value="medium">🟡 Средний</option>
                                    <option value="high">🔴 Высокий</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Сортировка по</label>
                                <select id="filterSortBy">
                                    <option value="due_date">📅 Сроку выполнения</option>
                                    <option value="created_at">🕐 Дате создания</option>
                                    <option value="priority">⭐ Приоритету</option>
                                    <option value="title">📝 Названию</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Порядок</label>
                                <select id="filterSortOrder">
                                    <option value="asc">🔼 По возрастанию</option>
                                    <option value="desc">🔽 По убыванию</option>
                                </select>
                            </div>
                            <button onclick="loadTasksWithFilters()" class="btn-filter">🔍 Применить</button>
                            <button onclick="resetFilters()" class="btn-reset">🔄 Сбросить</button>
                        </div>
                    </div>
                    
                    <div id="tasksList">
                        <p>Загрузка...</p>
                    </div>
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="background:white; max-width:500px; margin:50px auto; padding:25px; border-radius:15px;">
            <h2>✏️ Редактировать задачу</h2>
            <input type="hidden" id="editTaskId">
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="editTitle">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="editDesc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Срок выполнения</label>
                <input type="date" id="editDueDate">
            </div>
            <div class="form-group">
                <label>Приоритет</label>
                <select id="editPriority">
                    <option value="low">🟢 Низкий</option>
                    <option value="medium">🟡 Средний</option>
                    <option value="high">🔴 Высокий</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="editCompleted"> Выполнено
                </label>
            </div>
            <button onclick="updateTask()">Сохранить</button>
            <button onclick="closeModal()" class="btn-danger">Отмена</button>
        </div>
    </div>

    <div id="commentsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="background:white; max-width:600px; margin:50px auto; padding:25px; border-radius:15px;">
            <h2>💬 Комментарии</h2>
            <input type="hidden" id="commentsTaskId">
            <div id="commentsList" style="max-height:300px; overflow-y:auto; margin-bottom:15px;"></div>
            <div class="form-group">
                <textarea id="newComment" rows="2" placeholder="Написать комментарий..."></textarea>
            </div>
            <button onclick="addComment()">Добавить комментарий</button>
            <button onclick="closeCommentsModal()" class="btn-danger">Закрыть</button>
        </div>
    </div>

    <script>
        let currentToken = null;
        let currentUser = null;
        let currentPage = 1;

        const API_URL = 'http://127.0.0.1:8000/api';

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                alert('Заполните все поля');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Регистрация успешна! Теперь войдите.');
                    document.getElementById('regName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    alert('Ошибка: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('Ошибка соединения: ' + error);
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Заполните все поля');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    currentToken = data.api_token;
                    currentUser = data.user;
                    localStorage.setItem('token', currentToken);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showTasksPanel();
                    loadTasksWithFilters();
                } else {
                    alert('Ошибка входа: ' + (data.message || 'Неверные данные'));
                }
            } catch (error) {
                alert('Ошибка соединения: ' + error);
            }
        }

        async function logout() {
            if (currentToken) {
                try {
                    await fetch(`${API_URL}/logout`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentToken}`
                        }
                    });
                } catch(e) {}
            }
            currentToken = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showAuthPanel();
        }

        function showTasksPanel() {
            document.getElementById('unauthPanel').classList.add('hidden');
            document.getElementById('tasksPanel').classList.remove('hidden');
            document.getElementById('authPanel').classList.remove('hidden');
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userToken').textContent = currentToken.substring(0, 30) + '...';
        }

        function showAuthPanel() {
            document.getElementById('unauthPanel').classList.remove('hidden');
            document.getElementById('tasksPanel').classList.add('hidden');
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function getFilterParams() {
            const completed = document.getElementById('filterCompleted').value;
            const priority = document.getElementById('filterPriority').value;
            const sortBy = document.getElementById('filterSortBy').value;
            const sortOrder = document.getElementById('filterSortOrder').value;
            return { completed, priority, sortBy, sortOrder };
        }

        function buildFilterUrl(page = 1) {
            const { completed, priority, sortBy, sortOrder } = getFilterParams();
            let url = `${API_URL}/tasks?page=${page}`;
            if (completed !== '') url += `&completed=${completed}`;
            if (priority !== '') url += `&priority=${priority}`;
            if (sortBy) url += `&sort_by=${sortBy}&sort_order=${sortOrder}`;
            return url;
        }

        async function loadTasksWithFilters(page = 1) {
            if (!currentToken) return;
            currentPage = page;
            try {
                const url = buildFilterUrl(page);
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await response.json();
                if (response.ok) {
                    renderTasks(data.data);
                    renderPagination(data);
                } else {
                    alert('Ошибка загрузки задач');
                }
            } catch (error) {
                alert('Ошибка соединения: ' + error);
            }
        }

        function resetFilters() {
            document.getElementById('filterCompleted').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterSortBy').value = 'due_date';
            document.getElementById('filterSortOrder').value = 'asc';
            loadTasksWithFilters();
        }

        // Функция создания задачи (исправлена)
        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const due_date = document.getElementById('taskDueDate').value;
            const priority = document.getElementById('taskPriority').value;
            const reminder_at = document.getElementById('taskReminder').value;

            if (!title) {
                alert('Введите название задачи');
                return;
            }

            // Подготовка данных для отправки
            const taskData = {
                title: title,
                description: description,
                due_date: due_date,
                priority: priority
            };

            // Добавляем reminder_at, только если оно заполнено
            if (reminder_at) {
                taskData.reminder_at = reminder_at;
            }

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify(taskData)
                });
                
                if (response.ok) {
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDesc').value = '';
                    document.getElementById('taskDueDate').value = '';
                    document.getElementById('taskReminder').value = '';
                    loadTasksWithFilters(currentPage);
                    alert('Задача создана успешно!');
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + JSON.stringify(error));
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        // Лайк/дизлайк
        async function rateTask(taskId, type) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}/rate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ type })
                });
                if (response.ok) {
                    loadTasksWithFilters(currentPage);
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        // Комментарии
        async function openComments(taskId) {
            document.getElementById('commentsTaskId').value = taskId;
            document.getElementById('commentsModal').style.display = 'block';
            await loadComments(taskId);
        }

        async function loadComments(taskId) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}/comments`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const comments = await response.json();
                const container = document.getElementById('commentsList');
                if (!comments || comments.length === 0) {
                    container.innerHTML = '<p>Нет комментариев. Будьте первым!</p>';
                    return;
                }
                let html = '';
                comments.forEach(comment => {
                    html += `<div class="comment">
                        <span class="comment-author">${escapeHtml(comment.user.name)}</span>
                        <span class="comment-date"> ${new Date(comment.created_at).toLocaleString()}</span>
                        <p>${escapeHtml(comment.content)}</p>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (error) {
                alert('Ошибка загрузки комментариев');
            }
        }

        async function addComment() {
            const taskId = document.getElementById('commentsTaskId').value;
            const content = document.getElementById('newComment').value;
            if (!content) {
                alert('Введите комментарий');
                return;
            }
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ content })
                });
                if (response.ok) {
                    document.getElementById('newComment').value = '';
                    await loadComments(taskId);
                } else {
                    alert('Ошибка добавления комментария');
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        function closeCommentsModal() {
            document.getElementById('commentsModal').style.display = 'none';
            document.getElementById('commentsList').innerHTML = '';
            document.getElementById('newComment').value = '';
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<p>😊 У вас пока нет задач. Создайте первую!</p>';
                return;
            }

            let html = '<table class="tasks-table"><thead><tr>';
            html += '<th>Название</th><th>Приоритет</th><th>Срок</th><th>Статус</th><th>Действия</th>';
            html += '</tr></thead><tbody>';

            tasks.forEach(task => {
                const priorityClass = `priority-${task.priority}`;
                const priorityText = { low: '🟢 Низкий', medium: '🟡 Средний', high: '🔴 Высокий' }[task.priority];
                const completedClass = task.is_completed ? 'completed' : '';
                const statusText = task.is_completed ? '✅ Выполнено' : '🔄 В процессе';

                html += `<tr class="${completedClass}">`;
                html += `<td><strong>${escapeHtml(task.title)}</strong><br><small>${escapeHtml(task.description || '')}</small></td>`;
                html += `<td class="${priorityClass}">${priorityText}</td>`;
                html += `<td>${task.due_date || '—'}</td>`;
                html += `<td>${statusText}</td>`;
                html += `<td>
                            <button onclick="toggleComplete(${task.id}, ${!task.is_completed})" class="btn-success btn-sm">${task.is_completed ? '↩️' : '✅'}</button>
                            <button onclick="openEditModal(${task.id})" class="btn-warning btn-sm">✏️</button>
                            <button onclick="deleteTask(${task.id})" class="btn-danger btn-sm">🗑️</button>
                            <button onclick="openComments(${task.id})" class="btn-sm">💬</button>
                            <button onclick="rateTask(${task.id}, 'like')" class="like-btn">👍</button>
                            <span class="likes-count">${task.likes_count || 0}</span>
                            <button onclick="rateTask(${task.id}, 'dislike')" class="like-btn">👎</button>
                            <span class="likes-count">${task.dislikes_count || 0}</span>
                          </td>`;
                html += `</tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderPagination(data) {
            const container = document.getElementById('pagination');
            if (!data || data.last_page <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = '';
            for (let i = 1; i <= data.last_page; i++) {
                if (i === data.current_page) {
                    html += `<button disabled style="background:#ccc;">${i}</button>`;
                } else {
                    html += `<button onclick="loadTasksWithFilters(${i})">${i}</button>`;
                }
            }
            container.innerHTML = html;
        }

        async function openEditModal(taskId) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const task = await response.json();
                if (response.ok) {
                    document.getElementById('editTaskId').value = task.id;
                    document.getElementById('editTitle').value = task.title;
                    document.getElementById('editDesc').value = task.description || '';
                    document.getElementById('editDueDate').value = task.due_date || '';
                    document.getElementById('editPriority').value = task.priority;
                    document.getElementById('editCompleted').checked = task.is_completed;
                    document.getElementById('editModal').style.display = 'block';
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        async function updateTask() {
            const taskId = document.getElementById('editTaskId').value;
            const title = document.getElementById('editTitle').value;
            const description = document.getElementById('editDesc').value;
            const due_date = document.getElementById('editDueDate').value;
            const priority = document.getElementById('editPriority').value;
            const is_completed = document.getElementById('editCompleted').checked;

            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ title, description, due_date, priority, is_completed })
                });
                if (response.ok) {
                    closeModal();
                    loadTasksWithFilters(currentPage);
                } else {
                    alert('Ошибка обновления');
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        async function toggleComplete(taskId, completed) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ is_completed: completed })
                });
                if (response.ok) {
                    loadTasksWithFilters(currentPage);
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Вы уверены, что хотите удалить задачу?')) return;
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (response.ok) {
                    loadTasksWithFilters(currentPage);
                }
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (savedToken && savedUser) {
            currentToken = savedToken;
            currentUser = JSON.parse(savedUser);
            showTasksPanel();
            loadTasksWithFilters();
        } else {
            showAuthPanel();
        }
    </script>
</body>
</html>
